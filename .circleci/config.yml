# Python CircleCI 2.1 configuration file
#
# Check https://circleci.com/docs/2.1/language-python/ for more details
#
version: 2.1
orbs:
  codecov: codecov/codecov@3.2.4
commands:
  run_split_pytests:
    parameters:
      env_name:
        type: string
      timeout:
        type: string
        default: "20m"
      extra_args:
        type: string
        default: ""
    steps:
      - run:
          no_output_timeout: << parameters.timeout >>
          name: Run split pytest suite
          command: |
            apt-get update
            apt-get install -yqq curl gpg
            source activate << parameters.env_name >>
            pwd
            pushd rapidtide/data/examples/src
            ./installtestdata
            popd
            TESTFILES=$(circleci tests glob rapidtide/tests/test*.py | circleci tests split --split-by=timings)
            mkdir -p rapidtide/tests/test-results
            set +e
            pytest \
              $TESTFILES \
              << parameters.extra_args >> \
              --junitxml=rapidtide/tests/test-results/junit.xml
            PYTEST_EXIT=$?
            set -e
            if [ "$PYTEST_EXIT" -eq 5 ]; then
              echo "No tests selected on this shard after filtering; continuing."
              exit 0
            fi
            exit "$PYTEST_EXIT"
  build_base_environment:
    steps:
      - run:
          name: Build base environment
          command: |
            if [[ -e /tmp/src/rapidtide/.venv ]]; then
                echo "Restoring environment from cache"
                source .venv/bin/activate
            else
                (sudo apt-get update || sudo apt-get update) # Robust apt update
                sudo apt-get install -y gfortran libopenblas-dev
                pip install --upgrade uv
                uv venv --clear
                source .venv/bin/activate
                uv pip install --upgrade "setuptools>=70"
                uv pip install --upgrade pip
                uv pip install --upgrade distlib
                uv pip install --upgrade pytest
            fi
  run_split_pytests_alt:
    parameters:
      timeout:
        type: string
        default: "20m"
      extra_args:
        type: string
        default: ""
    steps:
      - run:
          no_output_timeout: << parameters.timeout >>
          name: Run split pytest suite
          command: |
            sudo apt-get update
            sudo apt-get install -yqq curl gpg
            source .venv/bin/activate
            pwd
            pushd rapidtide/data/examples/src
            ./installtestdata
            popd
            TESTFILES=$(circleci tests glob rapidtide/tests/test*.py | circleci tests split --split-by=timings)
            mkdir -p rapidtide/tests/test-results
            set +e
            pytest \
              $TESTFILES \
              << parameters.extra_args >> \
              --junitxml=rapidtide/tests/test-results/junit.xml
            PYTEST_EXIT=$?
            set -e
            if [ "$PYTEST_EXIT" -eq 5 ]; then
              echo "No tests selected on this shard after filtering; continuing."
              exit 0
            fi
            exit "$PYTEST_EXIT"
jobs:


  build_py310:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: continuumio/miniconda3
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
              - src/rapidtide
      - restore_cache:  # ensure this step occurs *before* installing dependencies
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run:  # will overwrite rapidtide installation each time
          name: Generate environment
          command:  |
            if [[ -e /opt/conda/envs/py310_env ]]; then
                echo "Restoring environment from cache"
                source activate py310_env
            else
                conda create -n py310_env python=3.10 -yq
                source activate py310_env
                pip install --upgrade "setuptools>=54"
                pip install --upgrade pip
                pip install --upgrade distlib
                pip install --upgrade pytest
            fi
            pip install .[tf,test,doc]
      - save_cache:  # environment cache tied to requirements
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/opt/conda/envs/py310_env"


