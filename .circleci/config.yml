# Python CircleCI 2.1 configuration file
#
# Check https://circleci.com/docs/2.1/language-python/ for more details
#
version: 2.1
orbs:
  codecov: codecov/codecov@3.2.4
commands:
  build_base_environment:
    steps:
      - run:
          name: Build base environment
          command: |
            if [[ -e /tmp/src/rapidtide/.venv ]]; then
                echo "Restoring environment from cache"
                source .venv/bin/activate
            else
                (sudo apt-get update || sudo apt-get update) # Robust apt update
                sudo apt-get install -y gfortran libopenblas-dev
                sudo apt-get install -yqq curl gpg
                pip install --upgrade uv
                uv venv --clear
                source .venv/bin/activate
                uv pip install --upgrade "setuptools>=70"
                uv pip install --upgrade pip
                uv pip install --upgrade distlib
                uv pip install --upgrade pytest
                uv pip install --upgrade numba
                uv pip install --upgrade pyfftw
            fi
  run_split_pytests:
    parameters:
      timeout:
        type: string
        default: "20m"
      extra_args:
        type: string
        default: ""
    steps:
      - run:
          no_output_timeout: << parameters.timeout >>
          name: Run split pytest suite
          command: |
            sudo apt-get update
            source .venv/bin/activate
            pwd
            pushd rapidtide/data/examples/src
            ./installtestdata
            popd
            TESTFILES=$(circleci tests glob rapidtide/tests/test*.py | circleci tests split --split-by=timings)
            mkdir -p rapidtide/tests/test-results
            set +e
            pytest \
              $TESTFILES \
              << parameters.extra_args >> \
              --color=yes \
              --junitxml=rapidtide/tests/test-results/junit.xml
            PYTEST_EXIT=$?
            set -e
            if [ "$PYTEST_EXIT" -eq 5 ]; then
              echo "No tests selected on this shard after filtering; continuing."
              exit 0
            fi
            exit "$PYTEST_EXIT"
jobs:
  build_py310:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.10
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/rapidtide
      - restore_cache: # ensure this step occurs *before* installing dependencies
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - build_base_environment
      - run: # will overwrite rapidtide installation each time
          name: Install rapidtide
          command: |
            uv pip install .[tf,test,doc]
      - save_cache: # environment cache tied to requirements
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/tmp/src/rapidtide/.venv"

  build_py311:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.11
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
              - src/rapidtide
      - restore_cache:  # ensure this step occurs *before* installing dependencies
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - build_base_environment
      - run:  # will overwrite rapidtide installation each time
          name: Install rapidtide
          command:  |
            uv pip install .[tf,test,doc]
      - save_cache:  # environment cache tied to requirements
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/tmp/src/rapidtide/.venv"

  build_py312:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/rapidtide
      - restore_cache: # ensure this step occurs *before* installing dependencies
          key: deps2-312-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - build_base_environment
      - run: # will overwrite rapidtide installation each time
          name: Install rapidtide
          command: |
            uv pip install .[tf,test,doc]
      - save_cache: # environment cache tied to requirements
          key: deps2-312-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/tmp/src/rapidtide/.venv"

  build_py313:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.13
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
              - src/rapidtide
      - restore_cache:  # ensure this step occurs *before* installing dependencies
          key: deps2-313-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - build_base_environment
      - run:  # will overwrite rapidtide installation each time
          name: Install rapidtide
          command:  |
            uv pip install .[tf,test,doc]
      - save_cache:  # environment cache tied to requirements
          key: deps2-313-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/tmp/src/rapidtide/.venv"

  build_py314:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.14
    resource_class: medium
    steps:
      - checkout
      - persist_to_workspace:
          root: /tmp
          paths:
              - src/rapidtide
      - restore_cache:  # ensure this step occurs *before* installing dependencies
          key: deps2-314-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - build_base_environment
      - run:  # will overwrite rapidtide installation each time
          name: Install rapidtide
          command:  |
            uv pip install .[test,doc]
      - save_cache:  # environment cache tied to requirements
          key: deps2-314-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
          paths:
            - "/tmp/src/rapidtide/.venv"

  test_py310:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.10
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "20m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m "not slow"'
      - store_test_results:
          path: rapidtide/tests/test-results
      - store_artifacts:
          path: rapidtide/tests/test-results

  test_py311_slow:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.11
    parallelism: 8
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "40m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m slow --cov-report xml:rapidtide/coverage_slow.xml --cov=rapidtide --cov-config=rapidtide/tests/.coveragerc'
      - run:
          name: Upload slow coverage if present
          command: |
            if [ -s rapidtide/coverage_slow.xml ]; then
              curl -Os https://cli.codecov.io/latest/linux/codecov
              chmod +x codecov
              ./codecov upload-process \
                -f rapidtide/coverage_slow.xml \
                -n "${CIRCLE_JOB}-${CIRCLE_NODE_INDEX}" \
                -F py311,slow
            else
              echo "No slow coverage report on this shard; skipping Codecov upload."
            fi
      - store_artifacts:
          path: rapidtide/coverage_slow.xml
          destination: artifact-file
      - store_test_results:
          path: rapidtide/tests/test-results
      - store_artifacts:
          path: rapidtide/tests/test-results

  test_py311_with_coverage:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.11
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "25m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m "not slow" --cov-report xml:rapidtide/coverage.xml --cov=rapidtide --cov-config=rapidtide/tests/.coveragerc'
      - run:
          name: Upload coverage if present
          command: |
            if [ -s rapidtide/coverage.xml ]; then
              curl -Os https://cli.codecov.io/latest/linux/codecov
              chmod +x codecov
              ./codecov upload-process \
                -f rapidtide/coverage.xml \
                -n "${CIRCLE_JOB}-${CIRCLE_NODE_INDEX}" \
                -F py311
            else
              echo "No coverage report on this shard; skipping Codecov upload."
            fi
      - store_artifacts:
          path: rapidtide/coverage.xml
          destination: artifact-file
      - store_test_results:
          path: rapidtide/tests/test-results

  test_py312:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.12
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-312-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "20m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m "not slow"'
      - store_test_results:
          path: rapidtide/tests/test-results
      - store_artifacts:
          path: rapidtide/tests/test-results

  test_py313:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.13
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-313-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "20m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m "not slow"'
      - store_test_results:
          path: rapidtide/tests/test-results
      - store_artifacts:
          path: rapidtide/tests/test-results

  test_py314:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.14
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-314-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
          timeout: "20m"
          extra_args: '-W ignore --ignore=rapidtide/candidatetests -m "not slow"'
      - store_test_results:
          path: rapidtide/tests/test-results
      - store_artifacts:
          path: rapidtide/tests/test-results

  build_docs:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.11
    resource_class: small
    steps:
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run:
          name: Build documentation
          command: |
            sudo apt-get update
            sudo apt-get install -yqq make
            source .venv/bin/activate
            uv pip install .[doc]
            uv pip uninstall pyqtgraph
            uv pip install numpydoc
            make -C docs html
      - store_artifacts:
          path: /tmp/src/rapidtide/docs/_build/html

  style_check:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: cimg/python:3.14
    resource_class: small
    steps:
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-314-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run:
          name: Linting
          command:  |
            source .venv/bin/activate
            uv pip install flake8-black
            flake8 --ignore=E114,E116,E127,E203,E231,E402,E501,E722,F401,F841,W503,W504 /tmp/src/rapidtide/rapidtide
      - store_artifacts:
          path: /tmp/data/lint

workflows:
  version: 2.1
  run_tests:
    jobs:
      - build_py310
      - test_py310:
          requires:
            - build_py310
      - build_py311
      - test_py311_with_coverage:
          requires:
            - build_py311
      - test_py311_slow:
          requires:
            - build_py311
      - build_py312
      - test_py312:
          requires:
            - build_py312
      - build_py313
      - test_py313:
          requires:
            - build_py313
      - build_py314
      - test_py314:
          requires:
            - build_py314
      - build_docs:
          requires:
            - build_py311
      #- style_check:
      #    requires:
      #      - build_py314
