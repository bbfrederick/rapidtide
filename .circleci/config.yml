  test_py310:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: continuumio/miniconda3
    parallelism: 4
    resource_class: large
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      MPLBACKEND: "Agg"
      MPLCONFIGDIR: "/tmp/mplconfig"
      PYTHONPATH: "/tmp/src/rapidtide"
    steps:
      - checkout
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-310-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run_split_pytests:
