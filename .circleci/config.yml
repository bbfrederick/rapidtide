            - build_py310
      - build_py311
      - build_py311_with_optional
      - test_py311_with_coverage:
          requires:
            - build_py311_with_optional
      - test_py311_slow:
          requires:
            - build_py311_with_optional
      #- test_py311_with_optional:
      #    requires:
      #      - build_py311
      - build_docs:
          requires:
            - build_py311
      - build_py312
      - test_py312:
          requires:
            - build_py312
      - build_py313
      - build_py313_alt
      - test_py313:
          requires:
            - build_py313
      - build_py314
      - test_py314:
          requires:
            - build_py314
      - build_py314_alt
      - test_py314_alt:
          requires:
            - build_py314_alt
      #- style_check:
      #    requires:
      #      - build_py313
