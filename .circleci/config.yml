  build_docs:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: continuumio/miniconda3
    resource_class: small
    steps:
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-311-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run:
          name: Build documentation
          command: |
            apt-get update
            apt-get install -yqq make
            source activate py311_env
            pip install .[doc]
            pip uninstall -y pyqtgraph
            pip install numpydoc
            #pip install pyqt5-sip
            make -C docs html
      - store_artifacts:
          path: /tmp/src/rapidtide/docs/_build/html

  style_check:
    working_directory: /tmp/src/rapidtide
    docker:
      - image: continuumio/miniconda3
    resource_class: small
    steps:
      - attach_workspace:  # get rapidtide
          at: /tmp
      - restore_cache:  # load environment
          key: deps2-313-{{ checksum "pyproject.toml" }}{{ checksum ".circleci/config.yml" }}
      - run:
          name: Linting
          command:  |
            source activate py313_env
            pip install flake8-black
            flake8 --ignore=E114,E116,E127,E203,E231,E402,E501,E722,F401,F841,W503,W504 /tmp/src/rapidtide/rapidtide
      - store_artifacts:
          path: /tmp/data/lint

